services:
  postgres:
    image: postgres:15-alpine
    container_name: carshare_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: carshare
      POSTGRES_PASSWORD: carshare_pass
      POSTGRES_DB: carshare_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carshare -d carshare_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carshare_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://carshare:carshare_pass@postgres:5432/carshare_db
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
